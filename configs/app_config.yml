# Application configuration for Housing Regression ML pipeline

paths:
  data_dir: "data"
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  model_dir: "models"
  predictions_dir: "data/predictions"
  raw_file: "data/raw/HouseTS.csv"

s3:
  bucket: "house-forecast"
  region: "us-east-1"
  model_prefix: "models/production"
  data_prefix: "processed"
  mlflow_prefix: "mlflow/artifacts"

model:
  name: "xgb_model"
  best_name: "xgb_best_model"
  default_params:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
    n_jobs: -1
    tree_method: "hist"

api:
  host: "0.0.0.0"
  port: 8000
  workers: 1
  reload: false
  log_level: "info"

logging:
  level: "INFO"
  format: "%(asctime)s %(name)s %(levelname)s %(message)s"
